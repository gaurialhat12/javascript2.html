<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student data</title>
</head>
<style>

    body{
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .sub{
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
    }
    .cd{
        height: 125px;
        width: 225px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background-color: #e7c6ff;
        border-radius:10px;
    }
    .idd{
        position: relative;
        left: 220px;
    }
    .named,.roll,.mks{
        text-align: center;
    }
</style>
<body>
    <div class="main" id="main">
        <div class="sub" id="sub"></div>
    </div>
</body>
<script>
    let data = [
    {
        id: 1,
        name: "disha",
        rollnumber: 101,
        marks: 78
    },
    {

    {

    {

    {

    }
];
const sub=document.getElementById("sub")
data.forEach((item,index)=>{
    const createDiv=document.createElement("div")
    createDiv.className="cd"
    const elemid=document.createElement("div")
    elemid.className="idd"
    const elemname=document.createElement("h4")
    elemname.className="named"
    const elemroll=document.createElement("div")
    elemroll.className="roll"
    const elemmks=document.createElement("div")
    elemmks.className="mks"
    elemid.innerText=item.id
    elemname.innerText=item.name
    elemroll.innerText=item.rollnumber
    elemmks.innerText=item.marks
    createDiv.append(elemid)
    createDiv.append(elemname)
    createDiv.append(elemroll)
    createDiv.append(elemmks)
    sub.append(createDiv)
})
</script>
</html>
