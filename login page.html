 <style>

<body>
    <div>

    </div>
</body>
<script>
    const validData=()=>{
        const elemINP1=document.getElementById("inp1").value
        const elemERR=document.getElementById("err")
        if(elemINP1==null || elemINP1===""){
            elemERR.innerText="this field is required"
            elemERR.style.color="red"
        } else{
            elemERR.innerText=" "
        }
    }
        const elemInp2=document.getElementById("inp2").value

        }else{

</script>
