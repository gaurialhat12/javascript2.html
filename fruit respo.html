<!DOCTYPE html>
<html lang="en">
<head>
<style>
body {
    font-family: sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.card-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.card {
    background-color: white;
    border-radius: 10px;
    box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
    transition: 0.3s;
    width: 150px;
    text-align: center;
    padding: 15px;
    cursor: pointer;
}

.card:hover {
    box-shadow: 0 8px 16px 0 rgba(0,0,0,0.4);
}

.fruit-emoji {
    font-size: 50px;
    margin-bottom: 10px;
}

.fruit-name {
    font-size: 18px;
    font-weight: bold;
    margin: 0;
}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-container" id="card-container">
        <!-- Fruit cards will be dynamically added here by JavaScript -->
    </div>

    <script src="script.js"></script>
</body>
<script>
const fruits = [
    { name: 'Apple', emoji: '🍎' },
    { name: 'Banana', emoji: '🍌' },
    { name: 'Grapes', emoji: '🍇' },
    { name: 'Watermelon', emoji: '🍉' }
];

const cardContainer = document.getElementById('card-container');

// Function to create a single fruit card element
function createFruitCard(fruit) {
    const card = document.createElement('div');
    card.classList.add('card');

    const emoji = document.createElement('p');
    emoji.classList.add('fruit-emoji');
    emoji.textContent = fruit.emoji;

    const name = document.createElement('p');
    name.classList.add('fruit-name');
    name.textContent = fruit.name;

    card.appendChild(emoji);
    card.appendChild(name);

    // Add interactivity (e.g., an alert when clicked)
    card.addEventListener('click', () => {
        alert(`You clicked on a ${fruit.name}!`);
    });

    return card;
}

// Loop through the fruits array and add each card to the container
fruits.forEach(fruit => {
    const fruitCard = createFruitCard(fruit);
    cardContainer.appendChild(fruitCard);
});
</script>

</html>
