<body>
    <!-- <div id/="input">Enter a number:<input type="number"></div> -->
     <div>
        <input type="number" id="input" placeholder="Enter a number">
     </div>
    <button onclick="table()">Submit</button>
    <div id="tbl"></div>
</body>
<script>
    const table=()=>{
        let i=1
        const eleminput=document.getElementById("input").value
        const elemTable=document.getElementById("tbl")
        for(i=1;i<=10;i++){
            console.log(`${eleminput} x ${i} = ${eleminput*i}`);
            let res=`${eleminput} x ${i} = ${eleminput*i}`
            const createElem=document.createElement("div")
            createElem.innerText=res
            elemTable.append(createElem)
        }
    }
</script>
