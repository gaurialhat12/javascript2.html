<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Image</title>
</head>
<style>
    body{
        height: 97vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .card{
        height:400px;
        border: 2px solid;
    }
    .imgcnt{
        height: 350px;
        border-bottom: 3px solid;
        background-position: center;
        background-repeat: no-repeat;
    }
    .btncnt{
        height: 50px;
        display: flex;
        justify-content: space-around;
        align-items: center;
    }
    button{
        cursor: pointer;
    }
</style>
<body>
    <div class="card" id="card">
        <div class="imgcnt" id="imgcnt">
            <img src="" alt="">
        </div>
        <div class="btncnt">
            <button onclick="chn('./images/iphone.jpg')">IPHONE</button>
            <button onclick="chn('./images/samsung.jpg')">SAMSUNG</button>
            <button onclick="chn('./images/oppo.jpg')">OPPO</button>
            <button onclick="chn('./images/vivo.jpg')">VIVO</button>
        </div>
    </div>
</body>
<script>
    const chn=(url)=>{
        const elemImgcnt=document.getElementById("imgcnt")
        elemImgcnt.style.backgroundImage=`url('${url}')`
    }
</script>
</html>
